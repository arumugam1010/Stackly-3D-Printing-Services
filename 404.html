<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found (404) | Stackly 3D</title>
  <meta name="description"
    content="Oops! The 3D model path you are looking for has encountered an extrusion error. File not found.">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .error-page-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background: var(--grad-dark);
      position: relative;
      overflow: hidden;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
      animation: code-pulse 2s ease-in-out infinite;
    }

    @keyframes code-pulse {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px rgba(238, 85, 54, 0.2));
      }

      50% {
        transform: scale(1.03);
        filter: drop-shadow(0 0 25px rgba(6, 182, 212, 0.4));
      }
    }

    .error-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .error-message {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 3rem;
    }

    /* 3D Printer Animation Box */
    .printer-box {
      position: relative;
      width: 280px;
      height: 200px;
      margin-bottom: 2rem;
      border: 3px solid var(--border-color);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.01);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 20px;
    }

    /* Printer Head */
    .print-head {
      position: absolute;
      top: 15px;
      left: 30px;
      width: 60px;
      height: 40px;
      background: var(--bg-tertiary);
      border: 2px solid var(--accent-primary);
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      animation: x-axis 5s infinite ease-in-out;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .print-nozzle {
      width: 10px;
      height: 12px;
      background: #f59e0b;
      /* brass color */
      clip-path: polygon(0 0, 100% 0, 70% 100%, 30% 100%);
      position: absolute;
      bottom: -11px;
    }

    .print-laser-glow {
      position: absolute;
      bottom: -25px;
      width: 4px;
      height: 15px;
      background: linear-gradient(180deg, var(--accent-secondary) 0%, transparent 100%);
      opacity: 0.8;
      animation: laser-flicker 0.2s infinite;
    }

    /* Layer model */
    .print-model {
      width: 120px;
      height: 35px;
      background: rgba(238, 85, 54, 0.1);
      border: 2px solid var(--accent-primary);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      animation: print-build 5s infinite steps(4);
    }

    /* Error Filament Tangling Spaghetti */
    .tangled-filament {
      position: absolute;
      bottom: 20px;
      width: 140px;
      height: 80px;
      background: transparent;
      border: 2px dashed var(--accent-danger);
      border-radius: 50% 40% 60% 30% / 40% 50% 30% 60%;
      animation: spaghetti 3s infinite alternate ease-in-out;
      opacity: 0;
    }

    /* Animation Keyframes */
    @keyframes x-axis {

      0%,
      100% {
        left: 40px;
        top: 15px;
      }

      25% {
        left: 180px;
        top: 25px;
      }

      50% {
        left: 110px;
        top: 45px;
      }

      75% {
        left: 60px;
        top: 60px;
      }
    }

    @keyframes laser-flicker {

      0%,
      100% {
        opacity: 0.2;
        height: 10px;
      }

      50% {
        opacity: 1;
        height: 20px;
      }
    }

    @keyframes print-build {
      0% {
        height: 0;
        background: transparent;
        border-color: transparent;
      }

      40% {
        height: 15px;
        background: rgba(238, 85, 54, 0.15);
        border-color: var(--accent-primary);
      }

      55% {
        height: 25px;
        background: rgba(6, 182, 212, 0.15);
        border-color: var(--accent-secondary);
      }

      70% {
        height: 30px;
        background: rgba(239, 68, 68, 0.15);
        border-color: var(--accent-danger);
      }

      80%,
      100% {
        height: 30px;
        background: rgba(239, 68, 68, 0.05);
        border-color: var(--text-muted);
      }
    }

    /* Switch visual states during error injection */
    .printer-box::after {
      content: "EXTRUDING...";
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent-success);
      border: 1px solid var(--accent-success);
      padding: 2px 6px;
      border-radius: 4px;
      animation: status-switch 5s infinite;
    }

    @keyframes status-switch {

      0%,
      69% {
        content: "BUILDING...";
        color: var(--accent-secondary);
        border-color: var(--accent-secondary);
      }

      70%,
      100% {
        content: "ERR: FILAMENT OUT";
        color: var(--accent-danger);
        border-color: var(--accent-danger);
      }
    }

    .error-laser {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-danger);
      opacity: 0;
      box-shadow: 0 0 10px var(--accent-danger);
      animation: scan 5s infinite linear;
    }

    @keyframes scan {

      0%,
      69% {
        opacity: 0;
        top: 0;
      }

      70% {
        opacity: 0.7;
        top: 20px;
      }

      100% {
        opacity: 0.7;
        top: 180px;
      }
    }
  </style>
</head>

<body data-theme="dark">

  <!-- Preloader -->
  <div id="preloader">
    <div class="preloader-logo">
      <div class="preloader-ring"></div>
      <div class="preloader-core"></div>
    </div>
    <p>STACKLY 3D</p>
  </div>

  <div class="error-page-container">
    <div class="glow-shape glow-1"></div>
    <div class="glow-shape glow-2"></div>

    <!-- Animated 3D Printer Failure simulation -->
    <div class="printer-box">
      <div class="error-laser"></div>
      <div class="print-head">
        <div class="print-nozzle"></div>
        <div class="print-laser-glow"></div>
      </div>
      <div class="print-model"></div>
    </div>

    <div class="error-code">404</div>
    <h1 class="error-title">Oops! The page you are looking for could not be found.</h1>
    <p class="error-message">It might have been moved or deleted.</p>

    <div class="error-actions" style="display: flex; gap: 1rem;">
      <a href="index.html" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          style="margin-right: 0.25rem;">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Return to Home
      </a>
      <a href="login.html" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          style="margin-right: 0.25rem;">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        LogIn to Portal
      </a>
    </div>
  </div>

  <div class="fab-container">
    <button class="theme-toggle-btn" aria-label="Toggle Dark/Light Theme"></button>
  </div>

  <!-- Scripts -->
  <script src="js/icons.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
